server {
    listen 80;
    listen [::]:80;

    server_name _;  # replace with actual domain

    root /var/www/zync-erp/public;
    index index.php index.html;

    # Pretty URLs — route everything through index.php
    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    # PHP-FPM
    location ~ \.php$ {
        include snippets/fastcgi-php.conf;
        fastcgi_pass unix:/run/php/php8.4-fpm.sock;
        fastcgi_param SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
        include fastcgi_params;
    }

    # Block dotfiles (.env etc.)
    location ~ /\. {
        deny all;
    }

    # Logs
    access_log /var/log/nginx/zync-erp.access.log;
    error_log  /var/log/nginx/zync-erp.error.log;
}
