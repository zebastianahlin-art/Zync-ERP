name: CI

on:
  push:
    branches: [main, "copilot/**"]
  pull_request:

permissions:
  contents: read

jobs:
  test:
    name: PHPUnit Tests (PHP ${{ matrix.php-version }})
    runs-on: ubuntu-latest

    permissions:
      contents: read

    strategy:
      matrix:
        php-version: ['8.3', '8.4']

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup PHP ${{ matrix.php-version }}
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php-version }}
          extensions: pdo, pdo_sqlite, pdo_mysql, mbstring, json
          coverage: none

      - name: Install Composer dependencies
        run: composer install --no-progress --prefer-dist --no-interaction
        working-directory: zync-erp

      - name: Run PHPUnit tests
        run: vendor/bin/phpunit --no-coverage
        working-directory: zync-erp

  lint:
    name: PHP Syntax Check
    runs-on: ubuntu-latest

    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          coverage: none

      - name: Check PHP syntax
        run: find zync-erp/app zync-erp/database/migrations -name "*.php" -exec php -l {} \; | grep -v "No syntax errors" && echo "Syntax errors found!" && exit 1 || echo "All PHP files OK"
